<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <title>V4 — Vertical Waves Converging</title>
  <desc>3 vertical sine-wave strips that CONVERGE at the bottom (like a funnel / RNA pinning to a single point) — completely different silhouette from Libra.</desc>
  <defs>
    <linearGradient id="v4-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1AFF"/>
      <stop offset="100%" stop-color="#5C5CFF"/>
    </linearGradient>
  </defs>
  <path d="M 60 40 Q 40 200, 200 360"  stroke="url(#v4-grad)" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M 200 40 Q 180 200, 200 360" stroke="url(#v4-grad)" stroke-width="22" fill="none" stroke-linecap="round" opacity="0.75"/>
  <path d="M 340 40 Q 320 200, 200 360" stroke="url(#v4-grad)" stroke-width="22" fill="none" stroke-linecap="round" opacity="0.5"/>
</svg>
